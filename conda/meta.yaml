{% set name = "sriptype" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ../

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - sriptype = sriptype_modules.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - flash
    - pigz
    - seqkit
    - blast
    - bedtools
    - samtools

test:
  commands:
    - sriptype --help
    - sriptype --version

about:
  home: https://github.com/your-org/SRIPType
  license: MIT
  license_file: LICENSE
  summary: SRIPType - A bioinformatics toolkit for sequence typing and analysis
  description: |
    SRIPType is a bioinformatics toolkit for sequence typing and analysis.
