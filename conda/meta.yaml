{% set name = "sriptype" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/s/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 97e47f170cce549d43d944b76a664c8a70ee7f985ab034faa9ce9ce02bf592ef

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - sriptype = sriptype_modules.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - flash
    - pigz
    - seqkit
    - blast
    - bedtools
    - samtools

test:
  commands:
    - sriptype --help

about:
  home: https://github.com/your-org/SRIPType
  license: MIT
  license_file: LICENSE
  summary: SRIPType - 51k-SINE-RIP chip genotyping tool